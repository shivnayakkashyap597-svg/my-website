<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivnayak Portfolio</title>

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: #0f172a;
  color: white;
}

/* NAVBAR */
nav {
  background: #020617;
  padding: 15px;
  text-align: center;
}
nav a {
  color: white;
  margin: 0 15px;
  text-decoration: none;
}

/* HERO */
header {
  text-align: center;
  padding: 80px 20px;
}
header h1 {
  font-size: 40px;
}
.btn {
  padding: 10px 20px;
  background: #38bdf8;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

/* SECTION */
.section {
  padding: 40px 20px;
  text-align: center;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}

/* CONTACT */
input, textarea {
  width: 80%;
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  border: none;
}

/* FOOTER */
footer {
  background: #020617;
  text-align: center;
  padding: 20px;
}

/* INSTAGRAM BUTTON */
.insta-btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 20px;
  background: #E1306C;
  color: white;
  border-radius: 25px;
  text-decoration: none;
}

/* WHATSAPP FLOAT */
.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  border-radius: 50%;
  padding: 15px;
  font-size: 22px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <a href="#about">About</a>
  <a href="#projects">Projects</a>
  <a href="#skills">Skills</a>
  <a href="#contact">Contact</a>
</nav>

<!-- HERO -->
<header>
  <h1>Hi, I'm Shivnayak 👋</h1>
  <p>Video Editor & Creator</p>
  <button class="btn" onclick="scrollToSection('projects')">View My Work</button>
</header>

<!-- ABOUT -->
<div class="section" id="about">
  <h2>👤 About Me</h2>
  <p>I create creative and cinematic videos.</p>
</div>

<!-- PROJECTS -->
<div class="section" id="projects">
  <h2>🎬 My Projects</h2>
  <div class="grid">
    <div class="card">
      <iframe width="100%" height="200" src="https://www.youtube.com/embed/cowMuJ3sw0Q"></iframe>
      <p>My Video</p>
    </div>
  </div>
</div>

<!-- SKILLS -->
<div class="section" id="skills">
  <h2>🛠 Skills</h2>
  <p>Video Editing, Creativity, Storytelling</p>
</div>

<!-- CONTACT -->
<div class="section" id="contact">
  <h2>📩 Contact Me</h2>
  <form onsubmit="sendMsg(event)">
    <input type="text" placeholder="Your Name" required><br>
    <input type="email" placeholder="Your Email" required><br>
    <textarea placeholder="Your Message" required></textarea><br>
    <button class="btn">Send</button>
  </form>
</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Shivnayak | All Rights Reserved</p>

  <a href="https://instagram.com/smil__e46" target="_blank" class="insta-btn">
    📸 Follow me on Instagram
  </a>
</footer>

<!-- WHATSAPP FLOATING BUTTON -->
<a href="https://wa.me/918853253719?text=Hello%20Shivnayak" 
   class="whatsapp-float" target="_blank">
   <i class="fab fa-whatsapp"></i>
</a>

<script>
function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function sendMsg(e){
  e.preventDefault();
  alert("Message Sent ✅");
}
</script>

</body>
</html>
