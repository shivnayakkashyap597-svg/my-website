</div>

<div id="reactionGame" style="display:none; margin-top:40px;">
  <h2>⚡ Reaction Game</h2>
  <div id="reactionBox" style="width:200px;height:200px;background:red;margin:auto;cursor:pointer;"></div>

</div>

<script>
let score = 0;
let time = 30;
let gameRunning = false;

function startGame(){
 document.getElementById("game").style.display="block";
 score = 0;
 time = 30;
 gameRunning = true;

 document.getElementById("score").innerText = score;
 document.getElementById("time").innerText = time;

 moveBox();

 let timer = setInterval(() => {
   time--;
   document.getElementById("time").innerText = time;

   if(time <= 0){
     clearInterval(timer);
     gameRunning = false;
     alert("⏰ Time Over! Score: " + score);
   }
 },1000);
}

function moveBox(){
 if(!gameRunning) return;

 let box=document.getElementById("box");
 box.style.left=Math.random()*(window.innerWidth-60)+"px";
 box.style.top=Math.random()*(window.innerHeight-60)+"px";
}

document.getElementById("box").onclick=function(e){
 if(!gameRunning) return;
 e.stopPropagation();
 score++;
 document.getElementById("score").innerText=score;
 document.getElementById("sound").play();
 moveBox();
};

// FIXED MISS CLICK
document.addEventListener("click", function(e){
 if(!gameRunning) return;
 if(e.target.id !== "box"){
   alert("❌ Miss Click! Game Over\nScore: " + score);
   gameRunning = false;
 }
});

// REACTION GAME
let reactionTimeout;
let reactionStartTime;

function startReactionGame(){
 document.getElementById("reactionGame").style.display="block";
 document.getElementById("reactionText").innerText="Wait for green...";
 let box = document.getElementById("reactionBox");
 box.style.background="red";

 let delay = Math.random()*3000 + 2000;

 reactionTimeout = setTimeout(() => {
   box.style.background="green";
   reactionStartTime = new Date().getTime();
 }, delay);
}

document.getElementById("reactionBox").onclick=function(){
 let box = document.getElementById("reactionBox");

 if(box.style.background==="red"){
   alert("❌ Too Early!");
   clearTimeout(reactionTimeout);
 }
 else{
   let reactionTime = new Date().getTime() - reactionStartTime;
   alert("⚡ Reaction Time: " + reactionTime + " ms");
 }
};
</script>
