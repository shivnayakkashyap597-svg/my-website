<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shivnayak Gaming Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

/* PROFILE IMAGE */
.about-pic {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  display: block;
  margin: 10px auto;
  object-fit: cover;
  border: 3px solid #00f7ff;
}

/* TAGLINE */
.tagline {
  color: #00f7ff;
  font-size: 18px;
  text-align: center;
  margin-top: 10px;
  text-shadow: 0 0 10px #00f7ff, 0 0 20px #00f7ff;
  animation: glow 1.5s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #00f7ff; }
  to { text-shadow: 0 0 20px #00f7ff, 0 0 30px #00f7ff; }
}

/* BODY */
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg,#020617,#0f172a);
  color: white;
  overflow-x: hidden;
  cursor: crosshair;
}

/* CARD (3D + NEON) */
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
  max-width: 700px;
  margin: auto;
  transition: transform 0.2s ease, box-shadow 0.2s;
  transform-style: preserve-3d;
  position: relative;
}

.card:hover {
  box-shadow: 0 0 30px #00f7ff;
}

.card::before {
  content: "";
  position: absolute;
  inset: -3px;
  border-radius: 15px;
  background: linear-gradient(270deg, #00f7ff, #ff00ff, #00f7ff);
  background-size: 400% 400%;
  z-index: -1;
  filter: blur(8px);
  animation: borderGlow 6s linear infinite;
}

@keyframes borderGlow {
  0% {background-position: 0%}
  50% {background-position: 100%}
  100% {background-position: 0%}
}

/* BUTTON */
.btn {
  padding: 12px 25px;
  background: #00f7ff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px #00f7ff, 0 0 40px #00f7ff;
}

/* RIPPLE */
@keyframes ripple {
  from { transform: scale(0); opacity: 1; }
  to { transform: scale(4); opacity: 0; }
}

/* SOCIAL */
.social-btn {
  display:inline-block;
  margin:10px;
  padding:10px 20px;
  border-radius:20px;
  background:#00f7ff;
  color:black;
  text-decoration:none;
  font-weight:bold;
  transition: 0.3s;
}

.social-btn:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 15px #00f7ff;
}

/* OTHER */
.section { padding: 50px 20px; text-align: center; }
nav { background: rgba(0,0,0,0.7); padding: 15px; text-align: center; }
nav a { color: #00f7ff; margin: 0 15px; text-decoration: none; font-weight: bold; }
header { text-align: center; padding: 100px 20px; }
#typing { font-size: 40px; color: #00f7ff; text-shadow: 0 0 20px #00f7ff; }

#particles-js { position: fixed; width: 100%; height: 100%; z-index:-1; }

.bar { background:#333; height:10px; border-radius:5px; }
.fill { background:#00f7ff; height:10px; border-radius:5px; }

.whatsapp-float {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  padding: 15px;
  border-radius: 50%;
  color: white;
}

</style>
</head>

<body>

<div id="particles-js"></div>

<nav>
  <a href="#about">About</a>
  <a href="#skills">Skills</a>
</nav>

<header>
  <h1 id="typing"></h1>
  <p>🎮 Gaming Creator & Developer</p>
  <button class="btn" onclick="startGame()">Play Game 🎮</button>
</header>

<div class="section" id="about">
  <div class="card">
    <h2>About Me</h2>

    <img src="myphoto.jpg" class="about-pic">

    👋 I'm <b>Shivnayak</b><br>
    🎓 BCA Student <br>
    💻 Programmer | 🎬 Video Editor | 🎮 Gamer

    <p class="tagline">🔥 Game Developer in Making 🔥</p>

    <a href="https://instagram.com/smil__e46" target="_blank" class="social-btn">Instagram</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
// typing
let text="🔥 Shivnayak Gaming Zone 🔥";
let i=0;
function typing(){
 if(i<text.length){
  document.getElementById("typing").innerHTML+=text.charAt(i);
  i++;
  setTimeout(typing,80);
 }
}
typing();

// particles
particlesJS("particles-js",{particles:{number:{value:80},color:{value:"#00f7ff"},size:{value:3},move:{speed:3}}});

// 3D tilt
const card = document.querySelector(".card");
card.addEventListener("mousemove", (e)=>{
 const rect = card.getBoundingClientRect();
 const x=(e.clientX-rect.left)/rect.width;
 const y=(e.clientY-rect.top)/rect.height;
 card.style.transform=`rotateX(${-(y-0.5)*20}deg) rotateY(${(x-0.5)*20}deg)`;
});
card.addEventListener("mouseleave", ()=>{
 card.style.transform="rotateX(0) rotateY(0)";
});

// ripple
document.querySelectorAll(".btn").forEach(btn=>{
 btn.addEventListener("click",function(e){
  const span=document.createElement("span");
  span.style.position="absolute";
  span.style.width=span.style.height="100px";
  span.style.background="rgba(255,255,255,0.3)";
  span.style.borderRadius="50%";
  span.style.left=e.offsetX+"px";
  span.style.top=e.offsetY+"px";
  span.style.transform="translate(-50%,-50%)";
  span.style.animation="ripple 0.6s linear";
  this.appendChild(span);
  setTimeout(()=>span.remove(),600);
 });
});
</script>

</body>
</html>
